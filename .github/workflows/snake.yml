name: 🐍 Generate Contribution Snake

# Regenerates the contribution-snake SVGs and pushes them to the `output` branch,
# which the README pulls from via raw.githubusercontent.com.

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

# Prevent overlapping runs (push + dispatch) from racing to push the output branch.
concurrency:
  group: snake-output
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Single theme-agnostic snake: colors read on BOTH light and dark backgrounds
          # (GitHub's theme can't be detected from CSS, so we don't switch on it).
          # IMPORTANT: snk strips the '#' from hex params, leaving invalid CSS that renders
          # BLACK. So we use CSS *named colors*, which are valid without a '#'.
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=teal&color_dots=slategray,mediumslateblue,slateblue,blueviolet,darkviolet

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
