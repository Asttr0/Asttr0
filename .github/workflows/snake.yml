name: 🐍 Generate Contribution Snake

# Regenerates the contribution-snake SVGs and pushes them to the `output` branch,
# which the README pulls from via raw.githubusercontent.com.

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=7c3aed&color_dots=ede9fe,c4b5fd,a78bfa,8b5cf6,6d28d9
            dist/github-contribution-grid-snake-dark.svg?color_snake=22d3ee&color_dots=2a2b52,4f46e5,7c3aed,c026d3,e879f9

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
